services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: aiportal-backend:dev
    environment:
      NODE_ENV: development
      PORT: "3001"
      # Bắt buộc: đọc setup-db.json từ /app/data (volume), không dùng /app/src/data
      BACKEND_ROOT: "/app"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-default-change-in-admin-settings}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SSL: "false"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: aiportal
      MINIO_SECRET_KEY: aiportal-minio-secret
      MINIO_BUCKET_NAME: portal
      # URL file trên trình duyệt (host thật, không dùng hostname Docker nội bộ minio)
      MINIO_ENDPOINT_PUBLIC: localhost
      MINIO_PUBLIC_BASE_URL: http://localhost:9000/portal
      BACKEND_CONTAINER_NAME: aiportal-backend
      FRONTEND_CONTAINER_NAME: aiportal-frontend
    volumes:
      # Mount toàn bộ backend để mọi thay đổi code/config cập nhật ngay
      - ./backend:/app
      # Giữ node_modules bên trong container để tránh xung đột với host
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    # Cài lại dependency trong Linux sau khi gắn volume — tránh esbuild/tsx lỗi
    # "@esbuild/darwin-arm64 present but platform needs linux-arm64" khi volume node_modules cũ từ Mac.
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      postgres:
        condition: service_started
    # Relax healthcheck so tsx watch slow startup does not get killed
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: aiportal-frontend:dev
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-default-change-in-admin-settings}
      # Rewrite http://minio:9000 trong HTML guide nếu API vẫn trả hostname nội bộ
      NEXT_PUBLIC_MINIO_BROWSER_ORIGIN: http://localhost:9000
    volumes:
      # Mount toàn bộ frontend để mọi thay đổi code/config cập nhật ngay
      - ./frontend:/app
      # Giữ dependencies/build cache trong container (volume này có thể lỗi thời khi thêm package mới)
      - /app/node_modules
      - /app/.next
    # Cài dependency theo package.json hiện tại trước khi dev — tránh "Can't resolve X" khi volume node_modules cũ
    command: ["sh", "-c", "npm install --legacy-peer-deps && npm run dev"]
    # Dev: khởi động ngay, không chờ healthy
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
