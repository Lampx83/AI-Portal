x-nextauth: &nextauth
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-default-change-in-admin-settings}

services:
  # Init script 01-create-research-db.sh chỉ chạy lần đầu khi volume mới. Nếu volume đã tồn tại mà chưa có DB "research", chạy: docker exec aiportal-postgres psql -U postgres -c "CREATE DATABASE research;"
  postgres:
    container_name: aiportal-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker-postgres-init:/docker-entrypoint-initdb.d
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    container_name: aiportal-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aiportal
      MINIO_ROOT_PASSWORD: aiportal-minio-secret
    volumes: [minio_data:/data]
    ports: ["9000:9000", "9001:9001"]

  backend:
    container_name: aiportal-backend
    build: { context: ./backend, dockerfile: Dockerfile }
    restart: unless-stopped
    environment:
      <<: *nextauth
      PORT: "3001"
      # Optional extra layer for /api/admin (defense-in-depth). Empty = rely on JWT is_admin only.
      # In prod set via .secrets.env (sourced by Deploy.sh); never commit the value.
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SSL: "false"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: aiportal
      MINIO_SECRET_KEY: aiportal-minio-secret
      MINIO_BUCKET_NAME: portal
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
      MINIO_ENDPOINT_PUBLIC: ${MINIO_ENDPOINT_PUBLIC:-}
      APP_URL: ${APP_URL:-}
      PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-}
      BACKEND_CONTAINER_NAME: aiportal-backend
      FRONTEND_CONTAINER_NAME: aiportal-frontend
      FRONTEND_APP_VERSION: ${FRONTEND_APP_VERSION:-}
      FRONTEND_BUILD_TIME: ${FRONTEND_BUILD_TIME:-}
      APP_VERSION: ${APP_VERSION:-}
      BUILD_TIME: ${BUILD_TIME:-}
    # Site Tuyển sinh nằm trong mạng NEU: DNS công cộng trả IP public của
    # courses.neu.edu.vn nhưng đường ra-rồi-vào bị chặn (hairpin), phải đi IP nội
    # bộ. Đặt COURSES_HOST_IP=10.2.11.23 trong Deploy.sh của site đó. Bỏ trống thì
    # giữ IP public như cũ — các site ngoài mạng NEU (Research) không bị ảnh hưởng.
    extra_hosts:
      - "courses.neu.edu.vn:${COURSES_HOST_IP:-203.113.132.48}"
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    container_name: aiportal-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3001
        APP_URL: ${APP_URL:-${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}}}
        NEXT_PUBLIC_APP_VERSION: ${FRONTEND_APP_VERSION:-}
        NEXT_PUBLIC_BUILD_TIME: ${FRONTEND_BUILD_TIME:-}
    restart: unless-stopped
    environment:
      <<: *nextauth
      APP_URL: ${APP_URL:-${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}}}
      BACKEND_URL: http://backend:3001
      # Heap mỗi worker. 2048 gây GC thrashing khi tải cao (từng làm nghẽn event loop).
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=4096}"
      # Số worker Next (server-cluster.cjs). 1 process = nghẽn 1 core khi đông người.
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-8}
    ports: ["${FRONTEND_PORT:-3000}:3000"]
    depends_on:
      backend: { condition: service_healthy }
      postgres: { condition: service_healthy }
    healthcheck:
      # Phải kèm BASE_PATH (vd. /tuyen-sinh): wget vào "/" trả 404 → container luôn "unhealthy"
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000${BASE_PATH:-}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  backend_data:
  minio_data:

networks:
  default:
    name: aiportal_network
