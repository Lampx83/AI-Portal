# Base path linh hoạt: truyền qua env.
# Production nên set đủ:
#   BASE_PATH=/tuyen-sinh
#   NEXTAUTH_URL=https://ai.neu.edu.vn/tuyen-sinh
#   APP_URL=https://ai.neu.edu.vn/tuyen-sinh
#   MINIO_PUBLIC_BASE_URL + NEXT_PUBLIC_MINIO_BROWSER_ORIGIN (URL MinIO công khai cho <img>)
# rồi chạy:
#   docker compose -f docker-compose.yml -f docker-compose.basepath.yml up --build -d
services:
  backend:
    environment:
       NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}}
       MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
       MINIO_ENDPOINT_PUBLIC: ${MINIO_ENDPOINT_PUBLIC:-}
       APP_URL: ${APP_URL:-}
       PUBLIC_UPLOAD_BASE_URL: ${PUBLIC_UPLOAD_BASE_URL:-}
  frontend:
    build:
      args:
        BASE_PATH: ${BASE_PATH:-/base-path}
        APP_URL: ${APP_URL:-${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}${BASE_PATH:-/base-path}}}
        NEXT_PUBLIC_API_BASE_URL: ${APP_URL:-${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}${BASE_PATH:-/base-path}}}
        NEXT_PUBLIC_MINIO_BROWSER_ORIGIN: ${NEXT_PUBLIC_MINIO_BROWSER_ORIGIN:-}
        NEXT_PUBLIC_LEGACY_STORAGE_PUBLIC_PREFIX: ${NEXT_PUBLIC_LEGACY_STORAGE_PUBLIC_PREFIX:-}
    environment:
      BASE_PATH: ${BASE_PATH:-/base-path}
      NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-/base-path}
      NEXT_PUBLIC_API_BASE_URL: ${APP_URL:-${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}${BASE_PATH:-/base-path}}}
      APP_URL: ${APP_URL:-${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3000}${BASE_PATH:-/base-path}}}
      PORTAL_DEFAULT_TITLE: ${PORTAL_DEFAULT_TITLE:-}
      PORTAL_DEFAULT_DESCRIPTION: ${PORTAL_DEFAULT_DESCRIPTION:-}
      NEXT_PUBLIC_MINIO_BROWSER_ORIGIN: ${NEXT_PUBLIC_MINIO_BROWSER_ORIGIN:-}
      NEXT_PUBLIC_LEGACY_STORAGE_PUBLIC_PREFIX: ${NEXT_PUBLIC_LEGACY_STORAGE_PUBLIC_PREFIX:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"