name: Push to Docker Hub

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/ai-portal-backend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=min

  frontend:
    name: frontend (${{ matrix.tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: latest
            build_args: |
              BACKEND_URL=http://backend:3001
              NEXTAUTH_URL=http://localhost:3000
          - tag: subpath
            build_args: |
              BACKEND_URL=http://backend:3001
              NEXTAUTH_URL=http://localhost:3000
              BASE_PATH=/tuyen-sinh
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/ai-portal-frontend:${{ matrix.tag }}
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
